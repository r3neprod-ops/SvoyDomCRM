<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#07111f" />
    <title>CRM24</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #07111f;
        color: #f4f7fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(45, 212, 191, 0.18), transparent 34rem),
          linear-gradient(160deg, #0f172a 0%, #07111f 62%, #05070a 100%);
      }

      main {
        width: min(100%, 420px);
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        background: rgba(15, 23, 42, 0.78);
        text-align: center;
        box-shadow: 0 22px 58px rgba(0, 0, 0, 0.42);
      }

      .logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 18px;
        display: grid;
        place-items: center;
        border-radius: 20px;
        background: linear-gradient(135deg, #2dd4bf, #60a5fa);
        color: #061018;
        font-weight: 900;
        letter-spacing: -0.04em;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 12px 0 0;
        color: rgba(244, 247, 251, 0.72);
        line-height: 1.55;
      }

      a {
        display: inline-flex;
        min-height: 46px;
        align-items: center;
        justify-content: center;
        margin-top: 22px;
        padding: 0 18px;
        border-radius: 16px;
        background: linear-gradient(135deg, #2dd4bf, #60a5fa);
        color: #061018;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo">24</div>
      <h1>CRM24</h1>
      <p>Нативное приложение подключается к рабочему серверу CRM.</p>
      <a href="https://24crmka.ru/admin/login">Открыть CRM</a>
    </main>
  </body>
</html>
